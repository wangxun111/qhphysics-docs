<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GITHUB_DEPLOYMENT_GUIDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/styles/github.min.css">
    <style>
        body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
        .mermaid { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <div id="content" class="markdown-body"></div>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/highlight.min.js"></script>
    <!-- Mermaid UMD (Global Scope) for file:// compatibility -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false });
        const rawMd = "# GitHub Pages 部署指南\r\n\r\n## 快速部署（推荐）\r\n\r\n### Windows 用户\r\n\r\n**第1步：查找你的 GitHub 用户名**\r\n\r\n1. 登录 GitHub：https://github.com\r\n2. 点击右上角头像\r\n3. 选择 \"Settings\"\r\n4. 在 Account 页面左侧看到你的用户名\r\n\r\n**第2步：运行部署脚本**\r\n\r\n打开命令行（Win + R，输入 cmd），然后：\r\n\r\n```bash\r\ncd F:\\new\\fishinggame\\QHPlugins\\QHForUnity\r\n\r\nREM 运行部署脚本，替换 your_github_username 为你的实际用户名\r\ndeploy_to_github.bat your_github_username\r\n```\r\n\r\n例如：\r\n```bash\r\ndeploy_to_github.bat octocat\r\ndeploy_to_github.bat john-doe\r\n```\r\n\r\n**第3步：输入 GitHub 凭据**\r\n\r\n脚本运行时会提示输入用户名和密码。有两种选择：\r\n\r\n**选项 A：使用密码（推荐）**\r\n```\r\nUsername: your_github_username\r\nPassword: your_github_password\r\n```\r\n\r\n**选项 B：使用 Personal Access Token（推荐用于安全）**\r\n1. 访问 https://github.com/settings/tokens\r\n2. 点击 \"Generate new token\"\r\n3. 选择权限：repo（完整控制私有仓库）\r\n4. 复制生成的 token\r\n5. 当脚本要求密码时，粘贴 token\r\n\r\n**第4步：启用 GitHub Pages**\r\n\r\n脚本完成后会显示一个链接，打开它：\r\n\r\n```\r\nhttps://github.com/your_github_username/qhphysics-docs/settings/pages\r\n```\r\n\r\n然后：\r\n1. 找到 \"Source\" 部分\r\n2. 选择 \"Deploy from a branch\"\r\n3. 选择分支：**main**\r\n4. 选择文件夹：**/ (root)**\r\n5. 点击 \"Save\"\r\n\r\n**完成！** 1-2 分钟后就能访问：\r\n```\r\nhttps://your_github_username.github.io/qhphysics-docs/Documentation_Hub.html\r\n```\r\n\r\n---\r\n\r\n### macOS/Linux 用户\r\n\r\n```bash\r\ncd F:\\new\\fishinggame\\QHPlugins\\QHForUnity\r\n\r\n# 运行部署脚本\r\nbash deploy_to_github.sh your_github_username\r\n```\r\n\r\n---\r\n\r\n## 手动部署（如果脚本不工作）\r\n\r\n### Step 1: 初始化 Git 仓库\r\n\r\n```bash\r\ncd F:\\new\\fishinggame\\QHPlugins\\QHForUnity\r\n\r\ngit init\r\ngit config user.name \"your_github_username\"\r\ngit config user.email \"your_email@example.com\"\r\n```\r\n\r\n### Step 2: 添加 GitHub 远程仓库\r\n\r\n```bash\r\n# 替换 your_github_username 为你的用户名\r\ngit remote add origin https://github.com/your_github_username/qhphysics-docs.git\r\n```\r\n\r\n### Step 3: 添加文件并提交\r\n\r\n```bash\r\ngit add .\r\ngit commit -m \"docs: Initial commit - XunPhysics documentation hub\"\r\n```\r\n\r\n### Step 4: 推送到 GitHub\r\n\r\n```bash\r\ngit branch -M main\r\ngit push -u origin main\r\n```\r\n\r\n### Step 5: 启用 GitHub Pages\r\n\r\n1. 打开 GitHub 仓库：`https://github.com/your_github_username/qhphysics-docs`\r\n2. 进入 Settings → Pages\r\n3. Source 选择 \"Deploy from a branch\"\r\n4. 选择 \"main\" 分支和 \"/ (root)\" 文件夹\r\n5. 点击 Save\r\n\r\n---\r\n\r\n## 访问你的网站\r\n\r\n部署完成后，你可以通过以下地址访问：\r\n\r\n**主页（文档中心）**：\r\n```\r\nhttps://your_github_username.github.io/qhphysics-docs/\r\n```\r\n\r\n**文档中心**：\r\n```\r\nhttps://your_github_username.github.io/qhphysics-docs/Documentation_Hub.html\r\n```\r\n\r\n**其他文档**：\r\n```\r\nhttps://your_github_username.github.io/qhphysics-docs/XunPhysics_Architecture.html\r\nhttps://your_github_username.github.io/qhphysics-docs/PhysX_Analysis.html\r\nhttps://your_github_username.github.io/qhphysics-docs/AI_Tuning_Getting_Started.html\r\nhttps://your_github_username.github.io/qhphysics-docs/AI_Parameter_Optimization.html\r\n```\r\n\r\n---\r\n\r\n## 常见问题\r\n\r\n### Q1: 我忘记了 GitHub 用户名\r\n\r\n**A**:\r\n1. 登录 GitHub\r\n2. 点击右上角头像\r\n3. 选择 Settings\r\n4. 你会看到 \"Public profile\" 中的用户名\r\n\r\n### Q2: 推送时说 \"Authentication failed\"\r\n\r\n**A**:\r\n1. GitHub 不再支持密码验证\r\n2. 使用 Personal Access Token 代替：\r\n   - 访问 https://github.com/settings/tokens\r\n   - 创建新 token（勾选 repo）\r\n   - 用 token 替代密码\r\n\r\n### Q3: 网站仍然不能访问\r\n\r\n**A**:\r\n1. 确保已启用 GitHub Pages\r\n2. 等待 1-2 分钟再试\r\n3. 在 Settings → Pages 检查部署状态\r\n4. 可能出现的消息：\r\n   - \"Your site is ready to be published\"：还需等待\r\n   - \"Your site is published\"：已完成，可以访问\r\n\r\n### Q4: 我想用自定义域名\r\n\r\n**A**:\r\n1. 在 GitHub Pages 设置中找到 \"Custom domain\"\r\n2. 输入你的域名（如 docs.example.com）\r\n3. 在域名服务商那里添加 CNAME 记录：\r\n   ```\r\n   your_github_username.github.io\r\n   ```\r\n4. GitHub 会自动配置 HTTPS\r\n\r\n### Q5: 如何更新网站内容？\r\n\r\n**A**:\r\n1. 修改本地文件\r\n2. 运行：\r\n   ```bash\r\n   git add .\r\n   git commit -m \"docs: Update documentation\"\r\n   git push\r\n   ```\r\n3. 等待 1-2 分钟，网站会自动更新\r\n\r\n---\r\n\r\n## 后续更新文档\r\n\r\n**每次添加新文档时**：\r\n\r\n1. 将新文件放在 `F:\\new\\fishinggame\\QHPlugins\\QHForUnity` 目录\r\n2. 运行：\r\n   ```bash\r\n   git add .\r\n   git commit -m \"docs: Add new documentation - [文档名]\"\r\n   git push\r\n   ```\r\n3. 1-2 分钟后网站自动更新\r\n\r\n---\r\n\r\n## 分享你的网站\r\n\r\n现在你可以分享这个链接：\r\n```\r\nhttps://your_github_username.github.io/qhphysics-docs/Documentation_Hub.html\r\n```\r\n\r\n任何人都可以从浏览器访问你的完整文档！\r\n\r\n---\r\n\r\n**需要帮助？** 查看 GitHub Pages 官方文档：https://pages.github.com/\r\n";
        // 1. Render Markdown to HTML
        document.getElementById('content').innerHTML = marked.parse(rawMd);
        hljs.highlightAll();
        // 2. Post-Process for Mermaid
        // marked.js renders ```mermaid as <pre><code class="language-mermaid">
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block, index) => {
            const pre = block.parentElement;
            const code = block.textContent;
            // Create separate div for Mermaid
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code;
            // Replace <pre> with <div>
            pre.replaceWith(div);
        });
        // 3. Trigger Mermaid Render
        // UMD version exposes global `mermaid` object
        mermaid.run();
    </script>
</body>
</html>
