<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Game Docs</title>
    <!-- 引入 Bootstrap 5 Icons & CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 引入 Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/github.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s;
            z-index: 10;
        }
        
        .sidebar-header {
            padding: 20px;
            background: #2c3e50;
            color: white;
            text-align: center;
        }
        
        #folder-nav {
            padding: 10px;
            border-bottom: 1px solid #eee;
            background: #ecf0f1;
        }
        
        .nav-folder {
            padding: 10px 15px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
            color: #34495e;
            transition: all 0.2s;
        }
        .nav-folder:hover { background: #dfe6e9; }
        .nav-folder.active { background: #3498db; color: white; }
        .nav-folder .count { font-size: 0.8em; background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 12px; }
        
        .file-list {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid #eee;
        }
        
        .file-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f1f1f1;
            display: flex;
            align-items: center;
            font-size: 0.9em;
            color: #333;
            transition: background 0.1s;
        }
        .file-item:hover { background: #f8f9fa; padding-left: 25px; }
        .file-item.active { background: #e3f2fd; color: #1976d2; border-left: 4px solid #1976d2; padding-left: 16px; font-weight: bold; }
        
        .file-icon { margin-right: 10px; font-size: 1.2em; }
        
        /* 主内容区域 */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: white;
            overflow: hidden;
        }

        #content-viewer {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            overflow: auto;
            position: relative;
        }

        /* Markdown渲染后的样式容器 */
        .markdown-body {
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h5 class="m-0"><i class="bi bi-journal-code"></i> 文档库索引</h5>
        </div>
        
        <!-- 文件夹导航区 -->
        <div id="folder-nav">
            <!-- 文件夹列表将通过 JS 渲染 -->
        </div>
        
        <!-- 文件列表区 -->
        <div class="file-list" id="file-list">
            <div class="text-center p-4 text-muted small">请先选择文件夹</div>
        </div>
    </div>

    <!-- 主展示区 -->
    <div class="main-content">
        <div class="empty-state" id="empty-state">
            <i class="bi bi-arrow-left-circle" style="font-size: 3rem;"></i>
            <h3 class="mt-3">请选择左侧文件查看</h3>
        </div>

        <!-- 这里用来放内容 -->
        <div id="content-viewer" style="display:none;"></div>
    </div>

    <!-- 1. 引入文件数据 (必须先运行 GenerateSiteData.ps1) -->
    <!-- 如果本地调试，请确保 site_data.js 存在 -->
    <script src="site_data.js"></script> 
    
    <!-- 2. 引入 Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- 3. 代码高亮 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/highlight.min.js"></script>

    <script>
        const folderNav = document.getElementById('folder-nav');
        const fileList = document.getElementById('file-list');
        const contentViewer = document.getElementById('content-viewer');
        const emptyState = document.getElementById('empty-state');
        
        // 渲染文件夹
        function initApp() {
            if (typeof siteData === 'undefined') {
                folderNav.innerHTML = '<div class="alert alert-danger m-2">未找到 site_data.js，请先生成数据。</div>';
                return;
            }

            // 渲染文件夹按钮
            Object.keys(siteData).forEach(key => {
                const folder = siteData[key];
                const btn = document.createElement('div');
                btn.className = 'nav-folder';
                btn.innerHTML = `<span><i class="bi bi-folder-fill text-warning"></i> ${folder.title || key}</span> <span class="count">${folder.items.length}</span>`;
                btn.onclick = () => showFiles(key, btn);
                folderNav.appendChild(btn);
            });
            
            // 自动选中第一个文件夹
            const firstKey = Object.keys(siteData)[0];
            if (firstKey) showFiles(firstKey, folderNav.firstChild);
        }

        // 渲染文件列表
        function showFiles(key, btnEl) {
            // 样式更新
            document.querySelectorAll('.nav-folder').forEach(el => el.classList.remove('active'));
            if(btnEl) btnEl.classList.add('active');
            
            fileList.innerHTML = '';
            const items = siteData[key].items;

            if (items.length === 0) {
                fileList.innerHTML = '<div class="text-center p-3 text-muted">此文件夹为空</div>';
                return;
            }

            items.forEach(file => {
                const row = document.createElement('div');
                row.className = 'file-item';
                // 图标
                let icon = 'bi-file-earmark-text';
                if (file.type === 'html') icon = 'bi-file-earmark-code text-danger';
                if (file.type === 'md') icon = 'bi-markdown text-primary';
                if (file.type === 'ps1' || file.type === 'py') icon = 'bi-terminal text-success';
                
                row.innerHTML = `<i class="bi ${icon} file-icon"></i> <div>${file.name}</div>`;
                row.onclick = () => loadFile(file, row);
                fileList.appendChild(row);
            });
        }

        // 加载内容
        function loadFile(file, rowEl) {
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            if(rowEl) rowEl.classList.add('active');

            emptyState.style.display = 'none';
            contentViewer.style.display = 'block';
            contentViewer.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-primary" role="status"></div><br>正在加载...</div>';

            if (file.type === 'html') {
                // HTML: iframe 嵌入
                contentViewer.innerHTML = `<iframe src="${file.path}" style="width:100%; height:100%; border:none;"></iframe>`;
            } 
            else if (['md', 'txt', 'ps1', 'py', 'js', 'json', 'cs', 'bat'].includes(file.type)) {
                // 文本类：Use fetch
                fetch(file.path)
                    .then(res => {
                        if (!res.ok) throw new Error("HTTP " + res.status);
                        return res.text();
                    })
                    .then(text => {
                        if (file.type === 'md') {
                            // Markdown Parse
                            const html = marked.parse(text);
                            contentViewer.innerHTML = `<div class="markdown-body">${html}</div>`;
                            // 代码高亮
                            contentViewer.querySelectorAll('pre code').forEach((el) => {
                                hljs.highlightElement(el);
                            });
                        } else {
                            // Code View
                            const safeCode = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                            contentViewer.innerHTML = `<div class="markdown-body"><pre><code class="language-${file.type}">${safeCode}</code></pre></div>`;
                            hljs.highlightElement(contentViewer.querySelector('code'));
                        }
                    })
                    .catch(err => {
                        contentViewer.innerHTML = `<div class="alert alert-danger m-5">加载失败: ${err}<br>请检查文件路径或网络。</div>`;
                    });
            } 
            else {
                contentViewer.innerHTML = `
                    <div class="text-center p-5">
                        <h4>此类文件不支持在线预览 (${file.type})</h4>
                        <a href="${file.path}" class="btn btn-primary mt-3" download>点击下载</a>
                    </div>`;
            }
        }

        initApp();
    </script>
</body>
</html>
