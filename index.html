<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fishing Game Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Fishing Game Physics Documentation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme: Dark by default -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    :root {
      --theme-color: #58a6ff;
    }
    .sidebar { background-color: #0d1117; border-right: 1px solid #30363d; }
    .content { background-color: #0d1117; color: #c9d1d9; }
    .sidebar-nav li a { color: #8b949e; }
    .sidebar-nav li.active > a { color: #58a6ff; border-right: 2px solid #58a6ff; font-weight: bold; }
    
    /* 适配大屏幕 */
    .markdown-section { max-width: 1000px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="app">Loading Documentation...</div>
  
  <script>
    window.docsify = {
      name: '🎣 <b>Fishing Game</b> <br><small>Physics & AI</small>',
      repo: 'https://github.com/wangxun111/qhphysics-docs',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: '🔍 Search...',
        noData: 'No Results!',
        depth: 6
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      }
    }
  </script>
  
  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
</body>
</html>
