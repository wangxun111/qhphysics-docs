<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - XunPhysics 文档中心</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-alt: #010409;
            --bg-card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent2: #79c0ff;
            --success: #3fb950;
            --danger: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo h1 {
            font-size: 1.8em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .login-logo p {
            color: var(--text-dim);
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: var(--text-dim);
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1em;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: var(--accent2);
        }

        .error-msg {
            display: none;
            color: var(--danger);
            font-size: 0.9em;
            margin-top: 12px;
            text-align: center;
        }

        .error-msg.visible {
            display: block;
        }

        .hint {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.82em;
            color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <h1>⚡ XunPhysics</h1>
            <p>文档中心 · 请先登录</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       placeholder="请输入用户名" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">登录</button>
            <p class="error-msg" id="errorMsg">用户名或密码错误，请重试。</p>
        </form>

        <p class="hint">默认账号：<code>admin</code> &nbsp;/&nbsp; 密码：<code>xunphysics</code></p>
    </div>

    <script>
        var SESSION_KEY = 'xunphysics_auth';

        // 凭据仅存于客户端，仅用于轻量级文档访问门控。
        // 这并不提供真正的安全保障——任何人均可查看页面源码。
        // 如需真正的访问控制，请替换为服务端身份验证。
        var USERS = {
            'admin': 'xunphysics'
        };

        // 若已登录，跳过登录页面
        if (sessionStorage.getItem(SESSION_KEY)) {
            redirectAfterLogin();
        }

        function handleLogin(event) {
            event.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;

            if (Object.prototype.hasOwnProperty.call(USERS, username) && USERS[username] === password) {
                sessionStorage.setItem(SESSION_KEY, '1');
                redirectAfterLogin();
            } else {
                document.getElementById('errorMsg').classList.add('visible');
            }
        }

        function redirectAfterLogin() {
            var params = new URLSearchParams(window.location.search);
            var redirect = params.get('redirect');
            // 使用 URL 构造函数验证重定向地址，以防止开放重定向攻击
            if (redirect) {
                try {
                    var url = new URL(redirect);
                    if (url.origin === window.location.origin) {
                        window.location.replace(redirect);
                        return;
                    }
                } catch (_) {
                    // 无效 URL——回退到默认页面
                }
            }
            window.location.replace('Documentation_Hub.html');
        }
    </script>
</body>
</html>
