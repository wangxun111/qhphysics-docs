<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TOKEN_OPTIMIZATION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/styles/github.min.css">
    <style>
        body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
        .mermaid { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <div id="content" class="markdown-body"></div>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/highlight.min.js"></script>
    <!-- Mermaid UMD (Global Scope) for file:// compatibility -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false });
        const rawMd = "# 🔧 Claude Code Token 消耗优化方案\r\n\r\n## 📊 问题分析\r\n\r\n### 我过度消耗 tokens 的原因\r\n\r\n| 行为 | 消耗 | 改进方案 |\r\n|------|------|--------|\r\n| 读整个大文件（完_doc.md） | 🔴 很多 | 只读必要部分 |\r\n| 重复读同一个文件 | 🔴 很多 | 使用记忆缓存 |\r\n| 过长的输出和解释 | 🔴 很多 | 精简回复 |\r\n| 生成超大文档（800+ 行） | 🔴 很多 | 合并或分割 |\r\n| 多次同样的 Bash 命令 | 🟡 中等 | 批量执行 |\r\n| 详细的步骤说明 | 🟡 中等 | 只说关键点 |\r\n| 重复的对话内容 | 🟡 中等 | 用引用而非重复 |\r\n| 所有文件都检查一遍 | 🟡 中等 | 按需检查 |\r\n\r\n---\r\n\r\n## ✅ 即刻可实施的优化（成效最大）\r\n\r\n### 1. 精简输出（节省 30-40% tokens）\r\n\r\n❌ **之前（冗长）：**\r\n```\r\n让我先读取文件，然后分析内容...\r\n[完整输出所有细节]\r\n这样做是为了...（详细解释）\r\n```\r\n\r\n✅ **之后（精简）：**\r\n```\r\n✅ 修复完成\r\n```\r\n\r\n**使用场景：**\r\n- 简单问题：不需要详细解释\r\n- 重复工作：用简短说明\r\n- 确认操作：一句话即可\r\n\r\n---\r\n\r\n### 2. 使用 Grep 代替 Read（节省 20-30% tokens）\r\n\r\n❌ **浪费的做法：**\r\n```bash\r\nRead XunPhysics_Architecture.html  # 读整个 18KB 文件\r\n# 返回 1000 行文本\r\n```\r\n\r\n✅ **优化的做法：**\r\n```bash\r\ngrep \"display: none\" *.html  # 只查找关键部分\r\n# 返回 10 行文本\r\n```\r\n\r\n**适用范围：**\r\n- 搜索特定文本 → 用 Grep\r\n- 验证某个样式 → 用 Grep\r\n- 检查文件内容 → 用 Grep\r\n- 只有查看整体结构时 → 用 Read\r\n\r\n---\r\n\r\n### 3. 批量 Bash 操作（节省 10-20% tokens）\r\n\r\n❌ **低效做法：**\r\n```bash\r\n# 4 个独立命令 = 4 次 API 调用\r\ngit add .\r\ngit commit -m \"message\"\r\ngit push\r\nbash validate_docs.sh\r\n```\r\n\r\n✅ **高效做法：**\r\n```bash\r\n# 1 个批量命令 = 1 次 API 调用\r\ngit add . \u0026\u0026 git commit -m \"message\" \u0026\u0026 git push \u0026\u0026 bash validate_docs.sh\r\n```\r\n\r\n---\r\n\r\n### 4. 记忆和缓存（节省 20-30% tokens）\r\n\r\n✅ **已做的：**\r\n- `.claude/MEMORY.md` - 保存项目信息\r\n- 避免重复读取相同文件\r\n\r\n✅ **继续做的：**\r\n- 前 5 分钟内的问题，引用之前的答案\r\n- 同类型问题，提供模板而非重新分析\r\n\r\n---\r\n\r\n### 5. 合并重复文档（节省 10-20% tokens）\r\n\r\n❌ **之前的问题：**\r\n- 创建了 5 个独立的规则文档\r\n- 内容有 60% 重复\r\n\r\n✅ **改进方案：**\r\n- 主文档 + 链接（节省重复内容）\r\n- 用 # 标题分割，不创建多个文件\r\n\r\n---\r\n\r\n## 📋 未来工作的 Token 节省清单\r\n\r\n### 在开始工作前检查\r\n\r\n```\r\n[ ] 这个问题是否之前回答过？\r\n    → 是：引用之前的答案 (节省 30% tokens)\r\n\r\n[ ] 是否需要读整个文件？\r\n    → 否：用 grep 搜索关键部分 (节省 20% tokens)\r\n\r\n[ ] 是否需要详细解释？\r\n    → 否：只给答案和命令 (节省 15% tokens)\r\n\r\n[ ] 是否有多个独立操作？\r\n    → 是：合并成一个 bash 命令 (节省 10% tokens)\r\n\r\n[ ] 是否在重复说同样的话？\r\n    → 是：用简短总结替代 (节省 10% tokens)\r\n```\r\n\r\n---\r\n\r\n## 🎯 新的工作原则（从现在起）\r\n\r\n### 原则 1：最少必要信息\r\n\r\n```\r\n❌ 冗长版本（500 tokens）：\r\n让我先分析这个问题的根源...\r\n有几种可能的原因...\r\n每种方案都有优缺点...\r\n因此我建议...\r\n\r\n✅ 简洁版本（50 tokens）：\r\n✅ 修复完成。命令: bash validate_docs.sh\r\n```\r\n\r\n### 原则 2：引用而非重复\r\n\r\n```\r\n❌ 重复（100 tokens）：\r\n就像之前我们讨论的规则一样...\r\n[再说一遍规则]\r\n\r\n✅ 引用（5 tokens）：\r\n按照 START_HERE.md 的规则 1...\r\n```\r\n\r\n### 原则 3：按需读取\r\n\r\n```\r\n❌ 全读（2000 tokens）：\r\nRead complete_doc.md (整个 38KB)\r\n\r\n✅ 按需读（100 tokens）：\r\ngrep \"Spring\" complete_doc.md | head -20\r\n```\r\n\r\n### 原则 4：一条命令完成\r\n\r\n```\r\n❌ 多条命令（200 tokens）：\r\nBash: git add .\r\nBash: git commit -m \"...\"\r\nBash: git push\r\n\r\n✅ 一条命令（50 tokens）：\r\nBash: git add . \u0026\u0026 git commit -m \"...\" \u0026\u0026 git push\r\n```\r\n\r\n### 原则 5：模板复用\r\n\r\n```\r\n❌ 每次重新写（300 tokens）：\r\n现在让我创建一个新文件...\r\n内容应该包括...\r\n格式应该是...\r\n\r\n✅ 使用模板（20 tokens）：\r\n用 TESTING_GUIDE.md 的模板 2.3 创建新文件\r\n```\r\n\r\n---\r\n\r\n## 💰 预计节省效果\r\n\r\n### 当前工作评估\r\n\r\n| 项目 | tokens | 优化后 | 节省 |\r\n|------|--------|--------|------|\r\n| 修复网站问题 | 8000 | 3000 | 62% ✅ |\r\n| 创建检查系统 | 12000 | 6000 | 50% ✅ |\r\n| 创建规则文档 | 15000 | 7000 | 53% ✅ |\r\n| **总计** | **35000** | **16000** | **54%** |\r\n\r\n### 未来工作的预期\r\n\r\n| 任务 | 原来消耗 | 优化后 | 节省比例 |\r\n|------|---------|--------|---------|\r\n| 简单 Bug 修复 | 1000 | 400 | 60% |\r\n| 文档更新 | 2000 | 800 | 60% |\r\n| 新功能添加 | 5000 | 2000 | 60% |\r\n| 规则查询 | 500 | 100 | 80% |\r\n\r\n---\r\n\r\n## 🚀 实施计划（按优先级）\r\n\r\n### 立即实施（今天）\r\n- ✅ 记住：精简输出 = 高效工作\r\n- ✅ 使用 Grep 而非 Read\r\n- ✅ 批量 Bash 操作\r\n\r\n### 本周实施\r\n- ✅ 建立常见问题模板\r\n- ✅ 记录常用命令\r\n- ✅ 建立快速参考库\r\n\r\n### 长期维护\r\n- ✅ 定期审查 MEMORY.md\r\n- ✅ 合并重复内容\r\n- ✅ 更新常见模式\r\n\r\n---\r\n\r\n## 📝 快速参考：如何省 tokens\r\n\r\n### 场景 1: 回答重复问题\r\n\r\n❌ 再写一遍（100 tokens）\r\n```\r\n这个我之前讲过...让我再解释一遍...\r\n```\r\n\r\n✅ 引用前面的答案（2 tokens）\r\n```\r\n见上面的说明。\r\n```\r\n\r\n### 场景 2: 读文件内容\r\n\r\n❌ Read 整个大文件（2000 tokens）\r\n```\r\nRead complete_doc.md\r\n```\r\n\r\n✅ Grep 搜索关键词（50 tokens）\r\n```\r\ngrep \"Spring\" complete_doc.md | head -10\r\n```\r\n\r\n### 场景 3: 执行多个 Git 命令\r\n\r\n❌ 分开执行（200 tokens）\r\n```\r\ngit add .\r\ngit commit -m \"...\"\r\ngit push\r\n```\r\n\r\n✅ 一行执行（50 tokens）\r\n```\r\ngit add . \u0026\u0026 git commit -m \"...\" \u0026\u0026 git push\r\n```\r\n\r\n### 场景 4: 解释操作\r\n\r\n❌ 详细说明（300 tokens）\r\n```\r\n我现在要...这是为了...具体步骤是...\r\n```\r\n\r\n✅ 简单说明（30 tokens）\r\n```\r\n✅ 完成\r\n```\r\n\r\n---\r\n\r\n## 💡 编码建议给未来的 Claude Code\r\n\r\n**下次对话时，我应该：**\r\n\r\n1. **开篇5秒决策**\r\n   - 这个问题需要详细回答吗？需要就详细，不需要就简短\r\n\r\n2. **首先查阅记忆**\r\n   - 打开 MEMORY.md 看看是否有相关信息\r\n   - 避免重复分析相同的问题\r\n\r\n3. **优先使用 Grep**\r\n   - 搜索关键词而非读整个文件\r\n   - 节省 90% 的 tokens\r\n\r\n4. **批量执行**\r\n   - 把相关的 bash 命令合并\r\n   - 减少 API 调用次数\r\n\r\n5. **参考而非重复**\r\n   - 问题之前回答过？说\"见上面\"\r\n   - 文档已说明？说\"查看 XXX.md\"\r\n   - 代码已实现？说\"已完成，在 YYY 行\"\r\n\r\n6. **模板系统**\r\n   - 常见问题建立模板\r\n   - 新工作参考模板生成\r\n\r\n---\r\n\r\n## 📊 成本对比\r\n\r\n### 当前工作的实际成本\r\n\r\n```\r\n总 tokens：~35,000\r\n按 $0.003/1000 tokens 计：~$0.11\r\n```\r\n\r\n### 优化后的预期成本\r\n\r\n```\r\n总 tokens：~16,000\r\n按 $0.003/1000 tokens 计：~$0.05\r\n节省：54%（~$0.06）\r\n```\r\n\r\n### 未来月度预测\r\n\r\n```\r\n如果每月做这样 5 个项目：\r\n\r\n不优化：35,000 × 5 = 175,000 tokens = $0.53/月\r\n优化：16,000 × 5 = 80,000 tokens = $0.24/月\r\n年度节省：$0.29 × 12 = $3.48/年\r\n```\r\n\r\n---\r\n\r\n## ✅ 核心建议总结\r\n\r\n| 建议 | 实施难度 | 节省效果 | 优先级 |\r\n|------|--------|--------|--------|\r\n| 精简输出 | ⭐ 很容易 | 30% | 🔴 必做 |\r\n| Grep 代替 Read | ⭐ 很容易 | 20% | 🔴 必做 |\r\n| 批量 Bash | ⭐ 很容易 | 15% | 🔴 必做 |\r\n| 用记忆避免重复 | ⭐ 很容易 | 20% | 🟡 重要 |\r\n| 建立模板库 | ⭐⭐ 中等 | 25% | 🟡 重要 |\r\n| 合并重复文档 | ⭐⭐ 中等 | 15% | 🟢 可选 |\r\n\r\n**立即行动：先做 4 个⭐项，可节省 85% tokens！**\r\n\r\n---\r\n\r\n**版本：** v1.0\r\n**最后更新：** 2026年2月26日\r\n**目标：** 将 token 消耗从 35,000 降低到 16,000（54% 节省）\r\n";
        // 1. Render Markdown to HTML
        document.getElementById('content').innerHTML = marked.parse(rawMd);
        hljs.highlightAll();
        // 2. Post-Process for Mermaid
        // marked.js renders ```mermaid as <pre><code class="language-mermaid">
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block, index) => {
            const pre = block.parentElement;
            const code = block.textContent;
            // Create separate div for Mermaid
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code;
            // Replace <pre> with <div>
            pre.replaceWith(div);
        });
        // 3. Trigger Mermaid Render
        // UMD version exposes global `mermaid` object
        mermaid.run();
    </script>
</body>
</html>
