    <script>
        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false });
        const rawMd = "# PhysX 物理引擎深度分析\r\n\r\n## 一、项目概述\r\n\r\nPhysX 是由 NVIDIA 开发的通用物理引擎，广泛应用于游戏、VR/AR、机器人仿真等领域。经过多个版本迭代，现在支持 CPU 和 GPU 加速计算。\r\n\r\n**最新版本**: PhysX 5.x\r\n**开发商**: NVIDIA（原 Ageia）\r\n**编程语言**: C++（C# 通过 wrapper 访问）\r\n**授权协议**: NVIDIA 专有许可证 + BSD（某些部分开源）\r\n**集成方式**: Unity / Unreal Engine / 自定义引擎\r\n\r\n---\r\n\r\n## 二、整体架构\r\n\r\n```\r\n┌──────────────────────────────────────────────────┐\r\n│              PhysX Runtime                       │\r\n├─────────────────────┬──────────────────────────┤\r\n│  Rigid Body Solver  │   Soft Body / Cloth      │\r\n│  (刚体动力学)        │   (布料、绳索、液体)     │\r\n├─────────────────────┼──────────────────────────┤\r\n│  Constraint System  │   Joint System           │\r\n│  (约束求解)         │   (20+ 关节类型)        │\r\n├─────────────────────┼──────────────────────────┤\r\n│  Collision Engine   │   Continuous Collision  │\r\n│  (碰撞检测)         │   Detection (CCD)       │\r\n├─────────────────────┼──────────────────────────┤\r\n│  Broad Phase (BVH)  │   Narrow Phase (GJK)    │\r\n│  (空间加速)         │   (精确碰撞测试)       │\r\n├──────────────────────────────────────────────────┤\r\n│         Parallel Task Dispatcher                 │\r\n│         (多线程/GPU 任务调度)                    │\r\n├──────────────────────────────────────────────────┤\r\n│         Memory Manager \u0026 Allocators              │\r\n│         (自定义内存管理)                        │\r\n└──────────────────────────────────────────────────┘\r\n```\r\n\r\n---\r\n\r\n## 三、核心模块详解\r\n\r\n### 3.1 刚体动力学 (Rigid Body Dynamics)\r\n\r\n**特点**：\r\n- 完整的刚体物理模拟\r\n- 支持静态、动态、运动学三种刚体类型\r\n- 自动睡眠机制（休眠优化）\r\n- 角速度、扭矩、惯性张量完整计算\r\n\r\n**主要类**：\r\n```\r\nPxRigidActor\r\n├── PxRigidStatic      // 静态物体（地形、建筑物）\r\n└── PxRigidDynamic     // 动态物体（可移动物体）\r\n    ├── 线性速度 (linearVelocity)\r\n    ├── 角速度 (angularVelocity)\r\n    └── 质量属性 (mass, inertia)\r\n```\r\n\r\n### 3.2 约束系统 (Constraint Solver)\r\n\r\n**求解器类型**：\r\n- **TGS (Temporal Gauss-Seidel)**: 新一代求解器，更精确\r\n- **PGS (Projected Gauss-Seidel)**: 经典求解器，更快\r\n\r\n**特点**：\r\n- 每个子步内迭代 4~8 次\r\n- 支持软约束（compliance）和约束阻尼\r\n- 准确的力反馈\r\n\r\n### 3.3 关节系统 (Joint System)\r\n\r\nPhysX 支持 20+ 种关节类型：\r\n\r\n| 关节类型 | 用途 | 自由度 |\r\n|---------|------|--------|\r\n| Fixed Joint | 固定连接 | 0 DOF |\r\n| Spherical Joint | 球形关节 | 3 DOF |\r\n| Revolute Joint | 旋转关节 | 1 DOF |\r\n| Prismatic Joint | 滑动关节 | 1 DOF |\r\n| Distance Joint | 距离约束 | 保持距离 |\r\n| D6 Joint | 通用关节 | 6 DOF |\r\n| Gear Joint | 齿轮关节 | 传动 |\r\n| Pulley Joint | 滑轮关节 | 传动 |\r\n\r\n### 3.4 碰撞检测 (Collision Engine)\r\n\r\n**宽相阶段 (Broad Phase)**：\r\n```\r\nBVH (Bounding Volume Hierarchy)\r\n├── 动态 BVH 树\r\n├── O(n log n) 复杂度\r\n└── 自动重构优化\r\n```\r\n\r\n**窄相阶段 (Narrow Phase)**：\r\n```\r\nGJK + EPA 算法\r\n├── 凸包碰撞 (Convex)\r\n├── 网格碰撞 (TriangleMesh)\r\n├── 高度场碰撞 (HeightField)\r\n└── 胶囊体、球体、盒子等\r\n```\r\n\r\n### 3.5 布料与柔体 (Cloth \u0026 SoftBody)\r\n\r\n**布料特点**：\r\n- Verlet 位置积分\r\n- 布料-刚体碰撞\r\n- 风力、重力、阻力\r\n\r\n**柔体特点**：\r\n- 四面体网格\r\n- 体积保持约束\r\n- 实时形变\r\n\r\n### 3.6 连续碰撞检测 (CCD)\r\n\r\n**机制**：\r\n- Speculative CCD：预测碰撞\r\n- Sweep CCD：轨迹扫描\r\n- 防止隧道效应\r\n\r\n---\r\n\r\n## 四、核心算法\r\n\r\n### 4.1 仿真主循环\r\n\r\n```\r\nPhysX.simulate(deltaTime):\r\n  1. 更新运动物体位置和速度\r\n  2. 宽相碰撞检测 (BVH)\r\n  3. 窄相碰撞检测 (GJK/EPA)\r\n  4. 碰撞缓冲生成\r\n  5. 求解所有约束 (TGS/PGS 迭代)\r\n  6. 更新速度和位置\r\n  7. 生成碰撞回调事件\r\n```\r\n\r\n### 4.2 半隐式欧拉积分\r\n\r\n```csharp\r\n// 速度更新\r\nv_new = v_old + (F / m) * dt + g * dt\r\n\r\n// 位置更新\r\nx_new = x_old + v_new * dt\r\n\r\n// 旋转更新\r\nω_new = ω_old + (τ / I) * dt\r\nq_new = q_old + 0.5 * ω_new * q_old * dt\r\n```\r\n\r\n**优势**：\r\n- 相对稳定\r\n- 支持大时间步\r\n- 易于调整\r\n\r\n### 4.3 TGS 约束求解\r\n\r\n```\r\nfor each iteration (4~8 times):\r\n    for each constraint:\r\n        计算约束违反量\r\n        计算冲量\r\n        应用到两端刚体\r\n```\r\n\r\n**关键特性**：\r\n- 支持约束优先级\r\n- 软约束（Compliance）\r\n- 约束阻尼（Damping）\r\n- 准确的力反馈\r\n\r\n### 4.4 GJK 碰撞检测\r\n\r\n**步骤**：\r\n```\r\n1. 初始化单纯形（Simplex）\r\n2. 迭代向支撑点方向移动\r\n3. 检查原点是否在单纯形内\r\n4. 如果碰撞，运行 EPA 计算碰撞深度\r\n```\r\n\r\n**优势**：\r\n- 处理任意凸形状\r\n- 数值稳定\r\n- 快速收敛\r\n\r\n---\r\n\r\n## 五、性能特性\r\n\r\n### 5.1 多线程架构\r\n\r\n```\r\n主线程              物理线程 (WorkQueue)\r\n   ↓                   ↓\r\nsimulate() ────→ TaskDispatcher\r\n                   ↓\r\n              ┌────┼────┐\r\n              ↓    ↓    ↓\r\n           任务1  任务2  任务3 (并行)\r\n              └────┼────┘\r\n                   ↓\r\n              取回结果\r\n```\r\n\r\n**并行化粒度**：\r\n- 刚体更新（batch）\r\n- 碰撞对处理（并行）\r\n- 约束迭代（数据并行）\r\n\r\n### 5.2 GPU 加速\r\n\r\nPhysX 5.x 支持 GPU 卸载：\r\n```\r\nCPU: 碰撞检测\r\nGPU: 约束求解、位置积分\r\n\r\n数据流：CPU ← GPU (双向传输)\r\n```\r\n\r\n### 5.3 内存模型\r\n\r\n```\r\n物理场景 (Scene)\r\n├── 刚体列表 (Preallocated)\r\n├── 约束缓冲 (Dynamic)\r\n├── 碰撞对缓冲 (Dynamic)\r\n└── 接触缓冲 (Frame-local)\r\n```\r\n\r\n**特点**：\r\n- 自定义内存分配器\r\n- 内存预分配\r\n- 无运行时分配（可选）\r\n\r\n---\r\n\r\n## 六、高级特性\r\n\r\n### 6.1 车辆物理 (Vehicle SDK)\r\n\r\n**包含**：\r\n- 轮胎模型（轮胎力计算）\r\n- 悬挂系统\r\n- 动力系统\r\n- 转向系统\r\n- 防滑控制 (ABS, ESC)\r\n\r\n### 6.2 破碎系统 (Destruction)\r\n\r\n**支持**：\r\n- 实时网格破碎\r\n- 凸壳分解\r\n- 碎片刚体生成\r\n\r\n### 6.3 液体和粒子\r\n\r\n**FLIP/PIC 粒子流体**：\r\n- 流体仿真\r\n- 粒子碰撞\r\n- 密度约束\r\n\r\n---\r\n\r\n## 七、与 XunPhysics 对比分析\r\n\r\n### 7.1 设计理念对比\r\n\r\n| 维度 | PhysX | XunPhysics |\r\n|------|-------|-----------|\r\n| **目标** | 通用物理引擎 | 钓鱼游戏专用 |\r\n| **优先级** | 物理准确性 | 实时性和手感 |\r\n| **复杂度** | 高（功能全面） | 低（简洁专用） |\r\n| **扩展性** | 高（支持各种场景） | 低（为钓鱼定制） |\r\n\r\n### 7.2 核心算法对比\r\n\r\n| 特性 | PhysX 5.x | XunPhysics |\r\n|------|-----------|-----------|\r\n| **积分方法** | 半隐式欧拉 | Verlet + 冲量混合 |\r\n| **时间步长** | 1/60s ~ 1/240s | 固定 0.0004s (2500Hz) |\r\n| **约束迭代** | 4~8 次/子步 | 1 次 + 高频 |\r\n| **碰撞检测** | GJK + EPA | 点-几何体测试 |\r\n| **宽相** | BVH | 无（暴力） |\r\n| **CCD** | Speculative + Sweep | 无 |\r\n\r\n### 7.3 功能完整性对比\r\n\r\n| 功能 | PhysX | XunPhysics |\r\n|------|-------|-----------|\r\n| **刚体** | ✅ 完整 | ✅ 基础 |\r\n| **关节** | ✅ 20+ 种 | ✅ 4 种 |\r\n| **约束** | ✅ 全类型 | ✅ 专用 |\r\n| **布料** | ✅ 有 | ❌ 无 |\r\n| **粒子流体** | ✅ 有 | ❌ 无 |\r\n| **车辆** | ✅ 完整 SDK | ❌ 无 |\r\n| **破碎** | ✅ 有 | ❌ 无 |\r\n| **绳索** | ❌ 无 | ✅ 优秀 |\r\n| **鱼体模拟** | ❌ 无 | ✅ 专用 |\r\n| **水物理** | ❌ 无 | ✅ 内置 |\r\n\r\n### 7.4 性能对比\r\n\r\n| 指标 | PhysX | XunPhysics |\r\n|------|-------|-----------|\r\n| **线程模型** | 多线程 + GPU | 独立线程单核 |\r\n| **扩展性** | 数万刚体 | 数百质点 |\r\n| **内存占用** | 高（功能多） | 低（专用） |\r\n| **学习曲线** | 陡峭 | 平缓 |\r\n\r\n---\r\n\r\n## 八、使用场景\r\n\r\n### PhysX 适用场景\r\n\r\n```\r\n✅ AAA 游戏（刚体为主）\r\n✅ VR/AR 应用\r\n✅ 机器人仿真\r\n✅ 车辆物理\r\n✅ 布料/破碎\r\n✅ 大规模场景\r\n```\r\n\r\n### XunPhysics 适用场景\r\n\r\n```\r\n✅ 钓鱼游戏\r\n✅ 鱼体动画\r\n✅ 鱼线模拟\r\n✅ 实时手感调优\r\n✅ 移动端轻量级物理\r\n```\r\n\r\n---\r\n\r\n## 九、集成与使用\r\n\r\n### 9.1 基本使用流程\r\n\r\n```csharp\r\n// 创建物理场景\r\nPxPhysics* physics = PxCreatePhysics(...);\r\nPxScene* scene = physics-\u003ecreateScene(...);\r\n\r\n// 创建刚体\r\nPxRigidDynamic* box = physics-\u003ecreateRigidDynamic(\r\n    PxTransform(position)\r\n);\r\nPxBoxGeometry geometry(halfExtents);\r\nbox-\u003eattachShape(PxRigidActorExt::createExclusiveShape(\r\n    *box, geometry, material\r\n));\r\nscene-\u003eaddActor(*box);\r\n\r\n// 模拟\r\nscene-\u003esimulate(1.0f / 60.0f);  // 16ms 步长\r\nscene-\u003efetchResults(true);\r\n\r\n// 读取结果\r\nPxTransform transform = box-\u003egetGlobalPose();\r\n```\r\n\r\n### 9.2 约束示例\r\n\r\n```csharp\r\n// 创建固定关节\r\nPxFixedJoint* joint = PxFixedJointCreate(\r\n    physics,\r\n    actor1, PxTransform(local1),\r\n    actor2, PxTransform(local2)\r\n);\r\n\r\n// 创建旋转关节\r\nPxRevoluteJoint* revolute = PxRevoluteJointCreate(\r\n    physics,\r\n    actor1, PxTransform(PxVec3(0, 0, 0),\r\n                        PxQuat(PxPiDivTwo, PxVec3(0, 1, 0))),\r\n    actor2, PxTransform(local2)\r\n);\r\nrevolute-\u003esetDriveVelocity(speed);\r\nrevolute-\u003esetDriveForceLimit(maxForce);\r\n```\r\n\r\n---\r\n\r\n## 十、优缺点分析\r\n\r\n### PhysX 优势\r\n\r\n1. **功能完整** ✅\r\n   - 刚体、布料、粒子、破碎一应俱全\r\n   - 支持复杂的多物体系统\r\n\r\n2. **算法精确** ✅\r\n   - TGS 迭代求解保证准确性\r\n   - GJK + EPA 碰撞检测稳定\r\n\r\n3. **性能优秀** ✅\r\n   - 多线程并行化\r\n   - GPU 加速支持\r\n   - BVH 宽相加速\r\n\r\n4. **业界标准** ✅\r\n   - Unity / Unreal 官方支持\r\n   - 文档齐全\r\n   - 社区活跃\r\n\r\n### PhysX 劣势\r\n\r\n1. **复杂度高** ❌\r\n   - 学习曲线陡峭\r\n   - 参数众多难以调优\r\n   - 集成成本大\r\n\r\n2. **不适合特定领域** ❌\r\n   - 无绳索/布料原生支持（相对于 XunPhysics）\r\n   - 无内置水物理\r\n   - 不适合高频迭代（2500Hz）\r\n\r\n3. **资源占用** ❌\r\n   - 内存占用大\r\n   - CPU/GPU 成本高\r\n\r\n### XunPhysics 优势\r\n\r\n1. **专用定制** ✅\r\n   - 为钓鱼场景优化\r\n   - 参数调优容易\r\n   - 手感可控\r\n\r\n2. **轻量级** ✅\r\n   - 代码量少\r\n   - 内存占用低\r\n   - 移动端友好\r\n\r\n3. **高频迭代** ✅\r\n   - 2500Hz 固定步长\r\n   - 精确的鱼线模拟\r\n   - 实时交互性好\r\n\r\n### XunPhysics 劣势\r\n\r\n1. **功能有限** ❌\r\n   - 不支持布料、粒子、破碎\r\n   - 碰撞系统简陋\r\n   - 不适合通用场景\r\n\r\n2. **可扩展性差** ❌\r\n   - 硬编码上限（1024质点）\r\n   - 双轨积分耦合\r\n   - 难以用于其他游戏类型\r\n\r\n3. **算法限制** ❌\r\n   - 单遍约束求解\r\n   - 无迭代收敛\r\n   - 链式弹簧累积误差\r\n\r\n---\r\n\r\n## 十一、选择建议\r\n\r\n### 选择 PhysX 当：\r\n\r\n```\r\n✅ 开发通用游戏（不限于钓鱼）\r\n✅ 需要完整的物理模拟\r\n✅ 项目规模大，有充足人力\r\n✅ 目标平台支持（Unity/Unreal）\r\n✅ 需要高度精确的物理\r\n```\r\n\r\n### 选择 XunPhysics 当：\r\n\r\n```\r\n✅ 专门开发钓鱼游戏\r\n✅ 需要轻量级引擎\r\n✅ 强调实时手感调优\r\n✅ 目标移动端\r\n✅ 希望完全定制控制\r\n```\r\n\r\n### 混合方案：\r\n\r\n```\r\n✅ PhysX 用于场景刚体（地形、建筑）\r\n✅ XunPhysics 用于钓鱼部分（鱼线、鱼体）\r\n✅ 两个系统并行运行，独立交互\r\n```\r\n\r\n---\r\n\r\n## 十二、发展趋势\r\n\r\n### PhysX 的未来方向\r\n\r\n```\r\n→ GPU 计算比重增加\r\n→ CUDA/OptiX 集成深化\r\n→ 实时 ray tracing 物理\r\n→ AI 辅助参数调优\r\n→ 云端物理仿真\r\n```\r\n\r\n### XunPhysics 的演化可能\r\n\r\n```\r\n→ 增加迭代约束求解\r\n→ 扩展约束类型\r\n→ GPU 加速\r\n→ 支持其他柔体\r\n→ 开源社区版本\r\n```\r\n\r\n---\r\n\r\n## 总结\r\n\r\n**PhysX** 和 **XunPhysics** 代表了物理引擎设计的两个极端：\r\n- **PhysX**：通用、准确、复杂、强大\r\n- **XunPhysics**：专用、快速、简洁、灵活\r\n\r\n没有绝对的\"更好\"，只有\"更适合\"。选择取决于你的具体需求。\r\n\r\n对于钓鱼游戏，XunPhysics 已经是**最优方案**。\r\n对于其他游戏类型，PhysX 仍是**业界标准**。\r\n\r\n---\r\n\r\n**文档版本**: v1.0\r\n**更新时间**: 2026年2月26日\r\n**对标引擎**: PhysX 5.x / XunPhysics 1.x\r\n";
        // 1. Render Markdown to HTML
        document.getElementById('content').innerHTML = marked.parse(rawMd);
        hljs.highlightAll();
        // 2. Post-Process for Mermaid
        // marked.js renders ```mermaid as <pre><code class="language-mermaid">
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block, index) => {
            const pre = block.parentElement;
            const code = block.textContent;
            // Create separate div for Mermaid
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code;
            // Replace <pre> with <div>
            pre.replaceWith(div);
        });
        // 3. Trigger Mermaid Render
        // UMD version exposes global `mermaid` object
        mermaid.run();
    </script>
