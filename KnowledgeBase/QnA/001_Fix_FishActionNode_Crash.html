<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>001_Fix_FishActionNode_Crash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/styles/github.min.css">
    <style>
        body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
        .mermaid { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <div id="content" class="markdown-body"></div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false });
        // Embed content safely
        const rawMd = "# Bug Fix: FishActionNode NullReference Crash\r\n**Date**: 2026-03-05\r\n**File**: Assets\\FishingFramework\\Module\\Fish\\FishAction\\BTTree\\Action\\FishActionNode.cs\r\n## Problem Description\r\nIn the ChangeForceDynamic method, logic was accessing .Value on a nullable float (\float?) without checking if it was null.\r\n`csharp\r\n// Risky Code\r\nSetForceTarget(actionData.InitForce.Value * ...);\r\n`\r\nIf \u0007ctionData.InitForce is null (e.g., initialization timing issue), this throws System.InvalidOperationException.\r\n## Solution\r\nUse .GetValueOrDefault() to safely unwrap the nullable type.\r\n`csharp\r\n// Safe Code\r\nSetForceTarget(actionData.InitForce.GetValueOrDefault() * ...);\r\n`\r\n## Best Practice\r\nWhen working with \float? or int? in simulation logic, always provide a default value or check for null to prevent runtime crashes during gameplay.\r\n";
        document.getElementById('content').innerHTML = marked.parse(rawMd);
        hljs.highlightAll();
        // Transform Mermaid Blocks
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block, index) => {
            const pre = block.parentElement;
            const code = block.textContent;
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code;
            pre.replaceWith(div);
        });
        mermaid.run();
    </script>
</body>
</html>
