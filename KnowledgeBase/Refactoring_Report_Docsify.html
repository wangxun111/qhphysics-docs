<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Refactoring_Report_Docsify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/styles/github.min.css">
    <style>
        body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
        .mermaid { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <div id="content" class="markdown-body"></div>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.0/highlight.min.js"></script>
    <!-- Mermaid UMD (Global Scope) for file:// compatibility -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false });
        const rawMd = "# 问题诊断与标准化重构报告\r\n\r\n## 🚫 当前核心问题\r\n1.  **CORS 跨域限制 (致命)**: \r\n    - 您在本地使用 `file:///G:/.../index.html` 打开网页时，浏览器安全策略会**禁止** JavaScript 读取同目录下的 `.js` 或 `.md` 文件。\r\n    - **后果**: 网页一片空白，无法加载数据。这是所有现代浏览器的标准行为。\r\n2.  **过度工程化 (Over-engineering)**:\r\n    - 我们之前的方案试图手写一个只使用 JS 的文件浏览器，这在没有后端支持的情况下非常脆弱，容易出错。\r\n3.  **工具链碎片化**:\r\n    - `ConvertMdToHtml` + `GenerateSiteData` + `SyncDocs` 多个脚本互相依赖，维护成本高。\r\n\r\n## 🛠️ 标准化解决方案：Docsify\r\n为了彻底解决上述问题，建议采用业界标准的文档框架 **[Docsify](https://docsify.js.org/)**。\r\n\r\n### 为什么选择 Docsify?\r\n1.  **无需构建**: 不需要将 `.md` 转换为 `.html`。Docsify 会在运行时自动解析 Markdown。\r\n2.  **标准化导航**: 自动支持侧边栏 (`_sidebar.md`) 和 导航栏 (`_navbar.md`)。\r\n3.  **插件丰富**: 搜索、图片缩放、代码复制、深色模式都开箱即用。\r\n4.  **GitHub Pages 完美支持**: 专为 GitHub Pages 设计。\r\n\r\n## 📋 执行计划\r\n我将为您执行以下标准化重构操作：\r\n\r\n1.  **重置主页**: 使用标准的 Docsify 模板覆盖 `index.html`。\r\n2.  **自动化侧边栏**: 编写一个新的脚本 `GenerateSidebar.ps1`，扫描文件夹生成 Docsify 格式的侧边栏。\r\n3.  **解决本地预览**: 创建 `Preview.bat`，利用 Python 启动一个微型本地服务器（避开 CORS 问题）。\r\n4.  **简化同步**: `SyncDocs.ps1` 不再需要进行文件转换，只需生成侧边栏并推送。\r\n\r\n---\r\n*Generated by AI Assistant*\r\n";
        // 1. Render Markdown to HTML
        document.getElementById('content').innerHTML = marked.parse(rawMd);
        hljs.highlightAll();
        // 2. Post-Process for Mermaid
        // marked.js renders ```mermaid as <pre><code class="language-mermaid">
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block, index) => {
            const pre = block.parentElement;
            const code = block.textContent;
            // Create separate div for Mermaid
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = code;
            // Replace <pre> with <div>
            pre.replaceWith(div);
        });
        // 3. Trigger Mermaid Render
        // UMD version exposes global `mermaid` object
        mermaid.run();
    </script>
</body>
</html>
