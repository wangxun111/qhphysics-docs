## ⚡ 快速部署（3分钟搞定）

### Step 1: 打开命令行

```bash
按 Win + R → 输入 cmd → 回车
```

### Step 2: 进入文档目录并运行部署脚本

**复制并粘贴这条完整命令**：

```bash
cd F:\new\fishinggame\QHPlugins\QHForUnity &amp;&amp; deploy_to_github.bat wangxun111
```

然后按回车。

### Step 3: 输入密码或 Token

脚本运行时会要求输入密码：

```
Username for 'https://github.com': wangxun111
Password for 'https://wangxun111@github.com': _
```

**选项 A：直接输入 GitHub 密码**
- 输入你的 GitHub 账户密码
- 密码不会显示（正常现象），输入完后回车

**选项 B：使用 Personal Access Token（推荐）**
1. 访问 https://github.com/settings/tokens
2. 点击 &quot;Generate new token&quot;
3. 勾选 &quot;repo&quot; 权限
4. 点击 &quot;Generate token&quot;
5. 复制生成的 token
6. 粘贴到密码框（Ctrl+V）

### Step 4: 启用 GitHub Pages

脚本运行完成后会看到这样的提示：

```
【下一步】启用 GitHub Pages：

1. 打开浏览器，访问：
   https://github.com/wangxun111/qhphysics-docs/settings/pages

2. 在 'Source' 中选择：'Deploy from a branch'

3. 选择分支：'main' 和 '/ (root)'

4. 点击 'Save'
```

**打开这个链接**（复制粘贴到浏览器）：
```
https://github.com/wangxun111/qhphysics-docs/settings/pages
```

在这个页面：
1. 找到 &quot;Source&quot; 部分
2. 选择 &quot;Deploy from a branch&quot;
3. 选择分支：**main**
4. 选择文件夹：**/ (root)**
5. 点击 **Save**

## 🔧 故障排除

### 问题 1: &quot;git not found&quot; 错误

**解决**：
1. 下载 Git：https://git-scm.com/download/win
2. 安装 Git
3. 重新运行脚本

### 问题 2: 密码验证失败

**解决**：
1. 访问 https://github.com/settings/tokens
2. 创建新 Personal Access Token
3. 勾选 &quot;repo&quot; 权限
4. 复制 Token
5. 重新运行脚本，使用 Token 作为密码

### 问题 3: 网站仍然 404

**解决**：
- 确保已启用 GitHub Pages（Settings → Pages）
- 等待 5-10 分钟
- 在浏览器中硬刷新：Ctrl + Shift + R
- 检查网址是否正确

### 问题 4: 脚本说&quot;远程仓库已存在&quot;

**解决**：
正常情况。脚本会自动处理，继续运行即可。
