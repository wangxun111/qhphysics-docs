    <textarea id="md-source" style="display:none;"># 会话沟通摘要 (Session History Summary)
**日期**: 2026-03-10
**主题**: 1档卷线器物理震荡修复 &amp; 项目基础设施建设

## 1. 核心问题回顾
**现象**: 当卷线器摩擦力处于 1档 (Low Friction, ~0.5N) 时，竿尖和线长出现剧烈的高频抖动 (Jitter)。
**原因分析**:
1. **信噪比崩塌**: 1档阈值极低，环境微小力变动占比过大，导致系统在“收线”和“出线”状态间频繁切换。
2. **正反馈回路**: 收线 -&gt; 线变短 -&gt; 拉力暴涨 -&gt; 超过摩擦力 -&gt; 判定出线 -&gt; 线变长 -&gt; 拉力骤降 -&gt; 判定收线。此循环导致震荡。
3. **物理模型缺陷**: 缺乏机械迟滞 (Hysteresis) 和阻尼 (Damping)。

## 2. 解决方案演进 (Reel1stBehaviour.cs)
### v1.0 (失败)
- 仅添加 `Mathf.Lerp` 平滑。
- **结果**: 震荡依旧，只是频率变低，变成大幅度“抽搐”。

### v2.0 (部分有效)
- 区分收线和出线逻辑，降低出线增益。
- **结果**: 出线稳定了，但收线时依然因为拉力突变导致反弹。

### v3.0 (最终稳定版)
**设计理念**: 能量压制与死区控制 (Energy Suppression &amp; Deadzone)。
1. **收线侧 (Reeling In)**:
   - **强制死区 (Deadzone)**: 当负载 &gt; 80% 摩擦力时，强制 `Speed = 0`。彻底切断震荡回路，模拟卸力松脱时的打滑。
   - **安全区限速**: 负载 &lt; 80% 时，速度限制为 20%，防止起步冲击。
2. **出线侧 (Drag Out)**:
   - **动态增益 (Dynamic Gain)**: 
     - 小超载 (&lt;0.5N): `Gain = 0.05` (极粘滞，防抖)。
     - 大超载 (&gt;2.0N): `Gain = 1.0` (全开，防断线)。
3. **代码解耦**:
   - 移除 `AppliedForceEqualizer` 依赖，使用本地 `Mathf.Lerp`。

## 3. 其他修复
- **FSM 死锁**: 修复 `PlayerSimpleThrow.cs` 中按住时间刚好超过阈值但立即松手导致返回 `null` 状态的问题（添加了 fallback 到 `PlayerIdle`）。

## 4. 基础设施建设
- **AI 规则文件**: 创建 `F:\new\fishinggame\AI_PROJECT_RULES.md`。
- **外部存储**: 建立 `G:\Copilot_OutPut\FishingGame` 目录结构。
  - `KnowledgeBase`: 存放技术文档。
  - `html`: 存放网页报告。
  - `Log`: 存放日志分析。

## 5. 待办/注意事项 (Next Steps)
- **FishingRodSimulation.cs**: 建议还原该文件（移除了调试日志），保持代码库清洁。
- **后续优化**: 观察动态增益在大鱼快速变向时的表现。
